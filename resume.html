<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - Syed Mahammad Jasim</title>
    <link rel="icon" href="https://img.icons8.com/ios-filled/50/ffffff/document.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background-color: #000;
    color: #fff;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 10%;
    background-color: #000;
}

.name {
    font-size: 24px;
    font-weight: bold;
}

.name .first-name {
    color: #fff;
}

.name .last-name {
    color: #f5a623;
}

nav {
    margin-left: auto;
}

.nav-links {
    display: flex;
    list-style: none;
}

.nav-links li {
    margin: 0 15px;
}

.nav-links li a {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s;
}

.nav-links li a:hover {
    color: #f5a623;
}

.resume-container {
    padding: 50px 10%;
    text-align: center;
}

.resume-container iframe {
    width: 100%;
    height: 800px; /* Adjust height as needed */
    border: none;
    max-width: 800px; /* Limit max width for larger screens */
    border-radius: 10px; /* Rounded corners */
}

.resume-container h2 {
    color: #f5a623;
    margin-bottom: 20px; /* Add margin for spacing */
}

/* Responsive Styles */
@media (max-width: 768px) {
    .resume-container {
        padding: 40px 5%; /* Adjust padding for smaller screens */
    }

    .resume-container h2 {
        font-size: 28px; /* Smaller heading size */
    }

    .resume-container iframe {
        height: 600px; /* Adjust height for smaller screens */
    }
}

@media (max-width: 480px) {
    header {
        flex-direction: column; /* Stack header elements */
        align-items: flex-start; /* Align items to the start */
    }

    .nav-links {
        flex-direction: column; /* Stack navigation links */
        align-items: flex-start; /* Align to the start */
    }

    .nav-links li {
        margin: 10px 0; /* Space between links */
    }

    .resume-container h2 {
        font-size: 24px; /* Smaller heading size */
    }

    .resume-container iframe {
        height: 500px; /* Further adjust height for very small screens */
    }
}

    </style>
</head>
<body>
    <header>
        <div class="name">
            <span class="first-name">Syed Mahammad</span> <span class="last-name">Jasim</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="resume.html" class="btn-secondary" download>Resume</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <section class="resume-container">
        <h2>My Resume</h2>
        <iframe src="assets/Syed Mahammad Jasim up.pdf" title="My Resume"></iframe>
    </section>
</body>
</html>
