<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Syed Mahammad Jasim</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1156/1156457.png" type="image/png" sizes="16x16" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
       * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background-color: #000;
    color: #fff;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 10%;
    background-color: #000;
}

.name {
    font-size: 24px;
    font-weight: bold;
}

.name .first-name {
    color: #fff;
}

.name .last-name {
    color: #f5a623;
}

nav {
    margin-left: auto;
}

.nav-links {
    display: flex;
    list-style: none;
}

.nav-links li {
    margin: 0 15px;
}

.nav-links li a {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s;
}

.nav-links li a:hover {
    color: #f5a623;
}

.contact {
    padding: 50px 10%;
    text-align: center;
}

.contact h2 {
    font-size: 36px;
    margin-bottom: 20px;
    color: #f5a623;
}

.contact p {
    font-size: 18px;
    margin-bottom: 20px;
}

.contact-form {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
}

.contact-form input,
.contact-form textarea {
    width: 300px;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #f5a623;
    border-radius: 5px;
    background: transparent;
    color: #fff;
}

.contact-form textarea {
    resize: vertical;
    height: 100px;
}

.contact-form button {
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    background: linear-gradient(90deg, #f5a623, #ff6f61);
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(245, 166, 35, 0.5);
}

.contact-form button:hover {
    background: linear-gradient(90deg, #ff6f61, #f5a623);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(245, 166, 35, 0.7);
}

.social-icons {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.social-icons a {
    color: #fff;
    font-size: 20px;
    margin: 0 10px;
    transition: color 0.3s ease;
}

.social-icons a:hover {
    color: #f5a623;
}

/* Responsive Styles */
@media (max-width: 768px) {
    .contact {
        padding: 40px 5%;
    }

    .contact h2 {
        font-size: 28px;
    }

    .contact-form input,
    .contact-form textarea {
        width: 90%; /* Wider input fields for smaller screens */
    }
}

@media (max-width: 480px) {
    header {
        flex-direction: column;
        align-items: flex-start;
    }

    .nav-links {
        flex-direction: column;
        align-items: flex-start;
    }

    .nav-links li {
        margin: 10px 0;
    }

    .contact h2 {
        font-size: 24px;
    }
}

    </style>
</head>
<body>
    <header>
        <div class="name">
            <span class="first-name">Syed Mahammad</span> <span class="last-name">Jasim</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="resume.html">Resume</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <section class="contact">
        <h2>Contact Me</h2>
        <p>If you have any questions or would like to get in touch, feel free to reach out!</p>
        <form class="contact-form" action="YOUR_FORM_ACTION_URL" method="POST">
            <input type="text" name="entry.123456" placeholder="Your Name" required>
            <input type="email" name="entry.123457" placeholder="Your Email" required>
            <textarea name="entry.123458" placeholder="Your Message" required></textarea>
            <button type="submit" class="btn">Send Message</button>
        </form>
        <div class="social-icons">
            <a href="mailto:syedmahammad@example.com"><i class="fas fa-envelope"></i></a>
            <a href="tel:+91-8341971419"><i class="fas fa-phone"></i></a>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>
</body>
</html>
